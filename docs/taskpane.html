<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Contact Extractor</title><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/><meta http-equiv="Pragma" content="no-cache"/><meta http-equiv="Expires" content="0"/><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><script defer="defer" src="taskpane.a34e1a156a541b213ef3.js"></script><link href="taskpane.b79e3431c93908f4fb02.css" rel="stylesheet"></head><body><div id="auth-bar"><span id="auth-status"></span> <button id="btn-signout" class="link-btn" hidden>Sign out</button></div><div id="view-signin" hidden><p class="hint">Sign in with your Microsoft account to save contacts.</p><button id="btn-signin" class="primary">Sign in with Microsoft</button></div><div id="view-loading" hidden><div class="spinner"></div><p class="hint">Reading contact info…</p></div><p id="error-msg" hidden></p><form id="view-form" hidden novalidate><section><h2>Name</h2><div class="row-2"><div class="field"><label for="firstName">First</label> <input id="firstName" name="firstName"/></div><div class="field"><label for="lastName">Last</label> <input id="lastName" name="lastName"/></div></div></section><section><h2>Contact</h2><div class="field"><label for="email">Email</label> <input type="email" id="email" name="email"/></div><div class="row-2"><div class="field"><label for="businessPhone">Business Phone</label> <input type="tel" id="businessPhone" name="businessPhone"/></div><div class="field"><label for="mobilePhone">Mobile</label> <input type="tel" id="mobilePhone" name="mobilePhone"/></div></div></section><section><h2>Work</h2><div class="field"><label for="company">Company</label> <input id="company" name="company"/></div><div class="field"><label for="jobTitle">Job Title</label> <input id="jobTitle" name="jobTitle"/></div><div class="field"><label for="website">Website</label> <input type="url" id="website" name="website"/></div></section><section><h2>Address</h2><div class="field"><label for="street">Street</label> <input id="street" name="street"/></div><div class="row-2"><div class="field"><label for="city">City</label> <input id="city" name="city"/></div><div class="field"><label for="state">State</label> <input id="state" name="state"/></div></div><div class="row-2"><div class="field"><label for="zip">ZIP</label> <input id="zip" name="zip"/></div><div class="field"><label for="country">Country</label> <input id="country" name="country"/></div></div></section><p id="status-msg" hidden></p><div class="actions"><button type="submit" id="btn-save" class="primary">Save Contact</button></div></form></body></html>
