<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Extractor</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <script>
    // Force a fresh load every time by appending a timestamp to the URL.
    // Outlook's webview ignores HTTP cache headers, so this ensures it
    // never serves a stale cached version of the task pane.
    (function() {
      var url = new URL(window.location.href);
      if (!url.searchParams.get('t')) {
        url.searchParams.set('t', Date.now());
        window.location.replace(url.toString());
      }
    })();
  </script>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <!-- Auth bar -->
  <div id="auth-bar">
    <span id="auth-status"></span>
    <button id="btn-signout" class="link-btn" hidden>Sign out</button>
  </div>

  <!-- Sign-in prompt (shown when not authenticated) -->
  <div id="view-signin" hidden>
    <p class="hint">Sign in with your Microsoft account to save contacts.</p>
    <button id="btn-signin" class="primary">Sign in with Microsoft</button>
  </div>

  <!-- Loading state -->
  <div id="view-loading" hidden>
    <div class="spinner"></div>
    <p class="hint">Reading contact info…</p>
  </div>

  <!-- Error message (top of pane) -->
  <p id="error-msg" hidden></p>

  <!-- Contact form -->
  <form id="view-form" hidden novalidate>
    <section>
      <h2>Name</h2>
      <div class="row-2">
        <div class="field">
          <label for="firstName">First</label>
          <input type="text" id="firstName" name="firstName" />
        </div>
        <div class="field">
          <label for="lastName">Last</label>
          <input type="text" id="lastName" name="lastName" />
        </div>
      </div>
    </section>

    <section>
      <h2>Contact</h2>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" />
      </div>
      <div class="row-2">
        <div class="field">
          <label for="businessPhone">Business Phone</label>
          <input type="tel" id="businessPhone" name="businessPhone" />
        </div>
        <div class="field">
          <label for="mobilePhone">Mobile</label>
          <input type="tel" id="mobilePhone" name="mobilePhone" />
        </div>
      </div>
    </section>

    <section>
      <h2>Work</h2>
      <div class="field">
        <label for="company">Company</label>
        <input type="text" id="company" name="company" />
      </div>
      <div class="field">
        <label for="jobTitle">Job Title</label>
        <input type="text" id="jobTitle" name="jobTitle" />
      </div>
      <div class="field">
        <label for="website">Website</label>
        <input type="url" id="website" name="website" />
      </div>
    </section>

    <section>
      <h2>Address</h2>
      <div class="field">
        <label for="street">Street</label>
        <input type="text" id="street" name="street" />
      </div>
      <div class="row-2">
        <div class="field">
          <label for="city">City</label>
          <input type="text" id="city" name="city" />
        </div>
        <div class="field">
          <label for="state">State</label>
          <input type="text" id="state" name="state" />
        </div>
      </div>
      <div class="row-2">
        <div class="field">
          <label for="zip">ZIP</label>
          <input type="text" id="zip" name="zip" />
        </div>
        <div class="field">
          <label for="country">Country</label>
          <input type="text" id="country" name="country" />
        </div>
      </div>
    </section>

    <!-- Success message (bottom of form) -->
    <p id="status-msg" hidden></p>

    <div class="actions">
      <button type="submit" id="btn-save" class="primary">Save Contact</button>
    </div>
  </form>
</body>
</html>
